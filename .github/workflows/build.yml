name: Build PingGuard

on:
  push:
    tags:
      - "v*"          # triggers on v2.0, v2.1, etc.
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
            artifact: PingGuard-windows.exe
            pyinstaller_args: --windowed --onefile --icon=assets/icon.ico
            binary: dist/PingGuard.exe

          - os: macos-latest
            name: macos
            artifact: PingGuard-macos.zip
            pyinstaller_args: --windowed --onefile --icon=assets/icon.icns
            binary: dist/PingGuard

          - os: ubuntu-latest
            name: linux
            artifact: PingGuard-linux
            pyinstaller_args: --onefile
            binary: dist/PingGuard

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux display dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libgl1 \
            libegl1 \
            libdbus-1-3 \
            libxcb1

      - name: Install Python dependencies
        run: |
          pip install PyQt6 psutil pyinstaller

      - name: Build with PyInstaller
        run: >
          pyinstaller ${{ matrix.pyinstaller_args }}
          --name PingGuard
          --add-data "assets:assets"
          main.py

      - name: Zip macOS binary
        if: matrix.os == 'macos-latest'
        run: zip -j PingGuard-macos.zip dist/PingGuard

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PingGuard ${{ github.ref_name }}
          body: |
            ## PingGuard ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Windows | PingGuard-windows.exe | Tested |
            | macOS | PingGuard-macos.zip | Beta — unzip and run |
            | Linux | PingGuard-linux | Beta — `chmod +x` then run |

            ### macOS note
            First run: right-click → Open (Gatekeeper will block a direct double-click on unsigned builds).

            ### Linux note
            Requires a system tray — works on GNOME (with AppIndicator extension), KDE, XFCE out of the box.
          files: |
            windows/PingGuard-windows.exe
            macos/PingGuard-macos.zip
            linux/PingGuard-linux
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
